<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHWA PICK 3 - XpliciTek</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h1 { color: #FFD700; text-align: center; font-size: 24px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 12px; background-color: #FFD700; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .resultat { margin-top: 20px; padding: 15px; border: 1px solid #444; border-radius: 8px; }
        .gold { color: #FFD700; font-weight: bold; }
        .normal { color: #00FF00; }
        .sekans { border-bottom: 1px solid #333; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>CHWA PICK 3 🎰</h1>
    <p style="text-align: center; font-size: 12px;">Strateji pa XpliciTek</p>
    
    <label>Boul Baz 1:</label>
    <input type="number" id="base1" placeholder="Ex: 01, 34, 90...">
    
    <label>Boul Baz 2:</label>
    <input type="number" id="base2" placeholder="Ex: 02, 35, 91...">
    
    <button onclick="kalkile()">KALKILE MATCH YO</button>

    <div id="display" class="resultat" style="display: none;"></div>
</div>

<script>
    // 1. DONÉ SISTÈM NAN
    const BAZ_1 = ["01", "12", "23", "34", "45", "56", "67", "78", "89", "90"];
    const BAZ_2 = ["02", "13", "24", "35", "46", "57", "68", "79", "80", "91"];
    
    const SEKANS = {
        "01": ["12", "90", "02", "91"],
        "12": ["13", "23", "01", "02"],
        "23": ["24", "34", "12", "13"],
        "34": ["35", "45", "23", "24"],
        "45": ["46", "56", "34", "35"],
        "56": ["67", "57", "45", "46"],
        "67": ["68", "78", "56", "57"],
        "78": ["79", "89", "67", "68"],
        "89": ["90", "00", "78", "79"],
        "90": ["01", "91", "89", "80"],
        "02": ["01", "12", "13", "91"],
        "13": ["24", "02", "14", "92"], // Egzanp sekans pou Baz 2
        "80": ["09", "19", "98", "97"]
    };

    const MIWA = {"0":"5", "1":"6", "2":"7", "3":"8", "4":"9", "5":"0", "6":"1", "7":"2", "8":"3", "9":"4"};

    function normaliz(b) {
        if (b.length === 1) b = "0" + b;
        let rev = b.split('').reverse().join('');
        if (BAZ_1.includes(b) || BAZ_2.includes(b)) return b;
        if (BAZ_1.includes(rev) || BAZ_2.includes(rev)) return rev;
        return b;
    }

    function kalkile() {
        let b1 = normaliz(document.getElementById('base1').value);
        let b2 = normaliz(document.getElementById('base2').value);
        let out = document.getElementById('display');
        out.style.display = "block";
        out.innerHTML = `<h3>Analiz: ${b1} & ${b2}</h3>`;

        let s1 = SEKANS[b1] || [];
        let s2 = SEKANS[b2] || [];

        let jwennMatch = false;

        s1.forEach(p1 => {
            s2.forEach(p2 => {
                // LOJIK MATCH GOLD (Dirèk oswa Revè)
                if (p1 === p2 || p1 === p2.split('').reverse().join('')) {
                    jwennMatch = true;
                    let chifKomen = [...new Set(b1)].filter(x => p1.includes(x))[0] || b1[0];
                    
                    out.innerHTML += `
                        <div class="sekans">
                            <span class="gold">🌟 MATCH GOLD: ${p1}</span><br>
                            Pick 3 Chwa: ${chifKomen}${p1} - ${chifKomen}${p1.split('').reverse().join('')}
                        </div>`;
                }
            });
        });

        if (!jwennMatch) {
            out.innerHTML += "<p>Pa gen match Gold dirèk. Tcheke miwa yo.</p>";
        }
    }
</script>

</body>
</html>
