<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHWA PICK 3 - XpliciTek</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f0c29; color: white; text-align: center; position: relative; min-height: 100vh; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 5rem; opacity: 0.05; pointer-events: none; white-space: nowrap; font-weight: bold; z-index: 0; }
        .card { background: #1a1a2e; padding: 25px; border-radius: 20px; max-width: 600px; margin: 20px auto; border: 2px solid #00d2ff; position: relative; z-index: 1; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        h1 { color: #00d2ff; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; }
        .mirror-box { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 10px; margin: 15px 0; font-size: 14px; border: 1px dashed #00d2ff; }
        select, input { width: 92%; padding: 12px; margin: 8px 0; border-radius: 10px; font-size: 16px; background: #16213e; color: #00d2ff; border: 1px solid #00d2ff; }
        .section-divider { border-top: 2px solid #00d2ff; margin: 30px 0; padding-top: 10px; }
        .sequence-header { color: #ff00ff; font-weight: bold; font-size: 20px; margin: 15px 0; border-bottom: 2px solid #ff00ff; display: inline-block; padding-bottom: 5px; }
        .pair-section { background: #16213e; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; border: 1px solid #0f3460; }
        .common-card { border: 2px solid #f8b400; background: #2a2401; }
        .pair-title { color: #00d2ff; font-weight: bold; font-size: 18px; margin-bottom: 10px; text-decoration: underline; }
        .pick3-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-family: 'Courier New', monospace; font-size: 16px; color: #fff; }
        .label-text { text-align: left; display: block; margin-top: 10px; color: #00d2ff; font-weight: bold; font-size: 14px; padding-left: 5%; }
        button { background: #00d2ff; color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="watermark">LAKOU CHWA</div>

<div class="card">
    <h1>CHWA PICK 3</h1>
    <p style="color: #aaa; margin-top: 0;">Strateji pa XpliciTek</p>

    <div class="mirror-box">
        <strong>RÈG MIWA (MIRROR):</strong><br>
        0=5 | 1=6 | 2=7 | 3=8 | 4=9
    </div>

    <span class="label-text">1. Chwazi Sekans:</span>
    <select id="baseType" onchange="updateOptions()">
        <option value="">-- Chwazi Sekans --</option>
        <option value="base1">Sekans Baz 1</option>
        <option value="base2">Sekans Baz 2</option>
        <option value="boulPe">Boul Pè</option>
    </select>

    <select id="numberSelect" onchange="generateResults()" style="display:none;"></select>

    <div id="outputArea">
        <div id="seqDisplay" class="sequence-header"></div>
        <div id="results"></div>
    </div>

    <div class="section-divider">
        <h2 style="color: #f8b400; font-size: 18px;">KONBINEZON 1 & 2 / PÈ</h2>
        <span class="label-text">Chwa 1:</span>
        <select id="compare1Type">
            <option value="base1">Base 1</option>
            <option value="base2">Base 2</option>
            <option value="boulPe">Boul Pè</option>
        </select>
        <input type="text" id="compare1Val" placeholder="Ex: 09">

        <span class="label-text">Chwa 2:</span>
        <select id="compare2Type">
            <option value="base1">Base 1</option>
            <option value="base2">Base 2</option>
            <option value="boulPe" selected>Boul Pè</option>
        </select>
        <input type="text" id="compare2Val" placeholder="Ex: 00">

        <button onclick="calculateCommon()">KONPARE KONBINEZON</button>
        <div id="commonResults"></div>
    </div>
</div>

<script>
const allData = {
    base1: {
        "01": { pairs: ["12", "02", "90", "91"], keys: {"12":["0","5"],"02":["1","6"],"90":["2","7"],"91":["3","8"]} },
        "02": { pairs: ["01", "12", "13", "91"], keys: {"01":["2","7"],"12":["0","5"],"13":["0","5"],"91":["3","8"]} },
        "03": { pairs: ["12", "23", "24", "02"], keys: {"12":["3","8"],"23":["1","6"],"24":["1","6"],"02":["4","9"]} },
        "04": { pairs: ["23", "34", "35", "13"], keys: {"23":["4","9"],"34":["2","7"],"35":["2","7"],"13":["5","0"]} },
        "05": { pairs: ["34", "45", "46", "24"], keys: {"34":["5","0"],"45":["3","8"],"46":["3","8"],"24":["6","1"]} },
        "06": { pairs: ["45", "56", "57", "35"], keys: {"45":["6","1"],"56":["4","9"],"57":["4","9"],"35":["7","2"]} },
        "07": { pairs: ["56", "67", "68", "46"], keys: {"56":["7","2"],"67":["5","0"],"68":["5","0"],"46":["8","3"]} },
        "08": { pairs: ["09", "89", "19", "97"], keys: {"09":["1","6","4","9"],"89":["1","6","4","9"],"19":["0","5","2","7"],"97":["0","5","2","7"]} },
        "09": { pairs: ["10", "19", "08", "98"], keys: {"10":["2","7","5","0"],"19":["2","7","5","0"],"08":["1","6","4","9"],"98":["1","6","4","9"]} },
        "10": { pairs: ["01", "91", "89", "80"], keys: {"01":["9","4"],"91":["0","5"],"89":["1","6"],"80":["9","4"]} }
    },
    base2: {
        "01": { pairs: ["12", "02", "90", "91"], keys: {"12":["0","5"],"02":["1","6"],"90":["2","7"],"91":["3","8"]} },
        "02": { pairs: ["01", "12", "13", "91"], keys: {"01":["2","7"],"12":["0","5"],"13":["0","5"],"91":["3","8"]} },
        "08": { pairs: ["09", "89", "19", "97"], keys: {"09":["1","6"],"89":["1","6"],"19":["0","5"],"97":["0","5"]} }
        // Ou ka kontinye ajoute rès yo isit la...
    },
    boulPe: {
        "00": { pairs: ["12", "18", "92", "98", "19"], keys: {"12":["0","5"],"18":["0","5"],"92":["0","5"],"98":["0","5"],"19":["0","5"]} },
        "11": { pairs: ["23", "29", "03", "09", "20"], keys: {"23":["1","6"],"29":["1","6"],"03":["1","6"],"09":["1","6"],"20":["1","6"]} },
        "22": { pairs: ["34", "30", "14", "10", "31"], keys: {"34":["2","7"],"30":["2","7"],"14":["2","7"],"10":["2","7"],"31":["2","7"]} },
        "33": { pairs: ["45", "41", "25", "21", "42"], keys: {"45":["3","8"],"41":["3","8"],"25":["3","8"],"21":["3","8"],"42":["3","8"]} },
        "44": { pairs: ["56", "52", "36", "32", "53"], keys: {"56":["4","9"],"52":["4","9"],"36":["4","9"],"32":["4","9"],"53":["4","9"]} },
        "55": { pairs: ["67", "63", "47", "43", "64"], keys: {"67":["5","0"],"63":["5","0"],"47":["5","0"],"43":["5","0"],"64":["5","0"]} },
        "66": { pairs: ["78", "74", "58", "54", "75"], keys: {"78":["6","1"],"74":["6","1"],"58":["6","1"],"54":["6","1"],"75":["6","1"]} },
        "77": { pairs: ["89", "85", "69", "65", "86"], keys: {"89":["7","2"],"85":["7","2"],"69":["7","2"],"65":["7","2"],"86":["7","2"]} },
        "88": { pairs: ["90", "76", "96", "70", "79"], keys: {"90":["8","3"],"76":["8","3"],"96":["8","3"],"70":["8","3"],"79":["8","3"]} },
        "99": { pairs: ["01", "07", "81", "87", "08"], keys: {"01":["9","4"],"07":["9","4"],"81":["9","4"],"87":["9","4"],"08":["9","4"]} }
    }
};

function updateOptions() {
    const type = document.getElementById('baseType').value;
    const selector = document.getElementById('numberSelect');
    selector.innerHTML = '<option value="">-- Chwazi Nimewo --</option>';
    if(!type || !allData[type]) { selector.style.display = "none"; return; }
    for(let num in allData[type]) { selector.innerHTML += `<option value="${num}">${num}</option>`; }
    selector.style.display = "block";
}

function generateResults() {
    const type = document.getElementById('baseType').value;
    const num = document.getElementById('numberSelect').value;
    const results = document.getElementById('results');
    const seqDisplay = document.getElementById('seqDisplay');
    if(!num) return;
    const data = allData[type][num];
    seqDisplay.innerHTML = `${num} &rarr; ${data.pairs.join(" - ")}`;
    results.innerHTML = "";
    data.pairs.forEach(pair => {
        let keys = data.keys[pair] || ["0","5"];
        let section = `<div class="pair-section"><div class="pair-title">Konbinezon pou: ${pair}</div><div class="pick3-grid">`;
        keys.forEach(k => { section += `<div>${k}${pair} - ${k}${pair[1]}${pair[0]}</div>`; });
        results.innerHTML += section + `</div></div>`;
    });
}

function normalize(n) {
    return n.toString().split('').sort().join('');
}

function calculateCommon() {
    const type1 = document.getElementById('compare1Type').value;
    const val1 = document.getElementById('compare1Val').value.trim();
    const type2 = document.getElementById('compare2Type').value;
    const val2 = document.getElementById('compare2Val').value.trim();
    const output = document.getElementById('commonResults');

    if(!allData[type1] || !allData[type1][val1] || !allData[type2] || !allData[type2][val2]) {
        output.innerHTML = "<p style='color:#ff4d4d;'>Erè: Nimewo sa a poko gen done oswa li pa nan baz la!</p>";
        return;
    }

    const data1 = allData[type1][val1];
    const data2 = allData[type2][val2];
    const normPairs2 = data2.pairs.map(p => normalize(p));
    
    let html = `<div class="sequence-header" style="color:#f8b400; border-bottom-color:#f8b400">KONBINEZON KOMEN</div>`;
    let found = false;

    data1.pairs.forEach(p1 => {
        const p1Norm = normalize(p1);
        if(normPairs2.includes(p1Norm)) {
            found = true;
            const originalFrom2 = data2.pairs.find(p => normalize(p) === p1Norm);
            const keys = data1.keys[p1] || ["0","5"]; 
            html += `<div class="pair-section common-card">
                <div class="pair-title" style="color:#f8b400">Match: ${p1} (avek ${originalFrom2})</div>
                <div class="pick3-grid">`;
            keys.forEach(k => { html += `<div>${k}${p1} - ${k}${p1[1]}${p1[0]}</div>`; });
            html += `</div></div>`;
        }
    });

    if(!found) html += `<p>Pa gen pair ki sanble ant yo.</p>`;
    output.innerHTML = html;
}
</script>
</body>
</html>
